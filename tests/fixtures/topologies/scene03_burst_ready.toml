id = "scene03_burst_ready"
name = "Burst Ready Topology"
description = "One root releases many downstream tasks at once"

[[tasks]]
id = "root"
command = "echo root"

[[tasks]]
id = "leaf_0"
command = "echo leaf_0"
dependencies = ["root"]

[[tasks]]
id = "leaf_1"
command = "echo leaf_1"
dependencies = ["root"]

[[tasks]]
id = "leaf_2"
command = "echo leaf_2"
dependencies = ["root"]

[[tasks]]
id = "leaf_3"
command = "echo leaf_3"
dependencies = ["root"]

[[tasks]]
id = "leaf_4"
command = "echo leaf_4"
dependencies = ["root"]
