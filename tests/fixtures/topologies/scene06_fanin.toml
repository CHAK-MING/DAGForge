id = "scene06_fanin"
name = "Fan-in Topology"
description = "Multiple upstream tasks converge to one join"

[[tasks]]
id = "seed_0"
command = "echo seed_0"

[[tasks]]
id = "seed_1"
command = "echo seed_1"

[[tasks]]
id = "seed_2"
command = "echo seed_2"

[[tasks]]
id = "seed_3"
command = "echo seed_3"

[[tasks]]
id = "join"
command = "echo join"
dependencies = ["seed_0", "seed_1", "seed_2", "seed_3"]

[[tasks]]
id = "tail"
command = "echo tail"
dependencies = ["join"]
