id = "scene08_trigger_rules_boundary"
name = "Trigger Rules Boundary"
description = "all_success failure boundary and one_failed monitoring mode"

[[tasks]]
id = "seed_ok"
command = "echo ok"

[[tasks]]
id = "seed_fail"
command = "exit 1"
max_retries = 0

[[tasks]]
id = "all_success_tail"
command = "echo should_not_run"
dependencies = ["seed_ok", "seed_fail"]

[[tasks]]
id = "one_failed_tail"
command = "echo one_failed"
dependencies = ["seed_ok", "seed_fail"]
trigger_rule = "one_failed"

[[tasks]]
id = "one_done_tail"
command = "echo one_done"
dependencies = ["seed_ok", "seed_fail"]
trigger_rule = "one_done"

[[tasks]]
id = "all_done_tail"
command = "echo all_done"
dependencies = ["seed_ok", "seed_fail"]
trigger_rule = "all_done"

[[tasks]]
id = "none_failed_tail"
command = "echo none_failed"
dependencies = ["seed_ok", "seed_fail"]
trigger_rule = "none_failed"
