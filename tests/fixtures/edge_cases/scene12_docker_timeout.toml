id = "scene12_docker_timeout"
name = "Docker Timeout"
description = "docker task should time out and unblock all_done tail"

[[tasks]]
id = "docker_sleep"
executor = "docker"
docker_image = "busybox:latest"
pull_policy = "IfNotPresent"
docker_socket = "/var/run/docker.sock"
command = "sleep 5"
timeout = 1
max_retries = 0

[[tasks]]
id = "all_done_tail"
command = "echo docker_cleanup"
dependencies = ["docker_sleep"]
trigger_rule = "all_done"

[[tasks]]
id = "all_success_tail"
command = "echo should_not_run"
dependencies = ["docker_sleep"]
trigger_rule = "all_success"
