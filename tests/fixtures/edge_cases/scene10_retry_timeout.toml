id = "scene10_retry_timeout"
name = "Retry Timeout"
description = "timeout on first attempt, retry succeeds on the second attempt"

[[tasks]]
id = "flaky"
command = '''
MARKER="/tmp/{{dag_id}}_{{run_id}}_retry_marker"
if [ -f "$MARKER" ]; then
  rm -f "$MARKER"
  echo retry_ok
else
  touch "$MARKER"
  sleep 2
  echo retry_fail
fi
'''
timeout = 1
retry_interval = 1
max_retries = 1

[[tasks]]
id = "report"
command = "echo retry_report"
dependencies = ["flaky"]
