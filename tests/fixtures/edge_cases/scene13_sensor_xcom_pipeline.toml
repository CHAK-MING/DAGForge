id = "scene13_sensor_xcom_pipeline"
name = "Sensor XCom Pipeline"
description = "sensor waits on a prepared artifact while downstream consumes xcom"

[[tasks]]
id = "prepare"
command = '''
FLAG="/tmp/{{dag_id}}_{{run_id}}_ready.flag"
touch "$FLAG"
echo ready
'''

[[tasks.xcom_push]]
key = "status"
source = "stdout"

[[tasks]]
id = "wait_ready"
executor = "sensor"
sensor_type = "file"
target = "/tmp/{{dag_id}}_{{run_id}}_ready.flag"
sensor_interval = 1
timeout = 5
dependencies = ["prepare"]

[[tasks]]
id = "consume"
command = 'test "$STATUS" = "ready"'
dependencies = ["prepare", "wait_ready"]

[[tasks.xcom_pull]]
key = "status"
from = "prepare"
env = "STATUS"
required = true

[[tasks]]
id = "cleanup"
command = 'rm -f "/tmp/{{dag_id}}_{{run_id}}_ready.flag"'
dependencies = ["consume", "wait_ready"]
trigger_rule = "all_done"
