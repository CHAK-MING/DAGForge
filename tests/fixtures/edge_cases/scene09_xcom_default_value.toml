id = "scene09_xcom_default_value"
name = "XCom Default Value"
description = "default_value fallback for missing xcom keys"

[[tasks]]
id = "seed"
command = "echo seed"

[[tasks]]
id = "default_string"
command = 'test "$DEFAULT_STRING" = "fallback"'
dependencies = ["seed"]

[[tasks.xcom_pull]]
key = "missing_string"
from = "seed"
env = "DEFAULT_STRING"
default_value = "fallback"

[[tasks]]
id = "default_empty_string"
command = 'test -z "$DEFAULT_EMPTY"'
dependencies = ["seed"]

[[tasks.xcom_pull]]
key = "missing_empty"
from = "seed"
env = "DEFAULT_EMPTY"
default_value = ""

[[tasks]]
id = "default_array"
command = 'test "$DEFAULT_ARRAY" = "[1,2]"'
dependencies = ["seed"]

[[tasks.xcom_pull]]
key = "missing_array"
from = "seed"
env = "DEFAULT_ARRAY"
default_value = [1, 2]

[[tasks]]
id = "default_object"
command = 'test "$DEFAULT_OBJECT" = "{\"answer\":42}"'
dependencies = ["seed"]

[[tasks.xcom_pull]]
key = "missing_object"
from = "seed"
env = "DEFAULT_OBJECT"
default_value = { answer = 42 }
