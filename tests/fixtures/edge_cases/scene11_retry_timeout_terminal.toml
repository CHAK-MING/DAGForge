id = "scene11_retry_timeout_terminal"
name = "Retry Timeout Terminal"
description = "task times out again during retry and eventually fails"

[[tasks]]
id = "flaky_timeout"
command = '''
MARKER="/tmp/scene11_retry_timeout_{{run_id}}_marker"
COUNT=0
if [ -f "$MARKER" ]; then
  COUNT=$(cat "$MARKER")
fi
COUNT=$((COUNT + 1))
printf '%s' "$COUNT" > "$MARKER"
sleep 2
'''
timeout = 1
retry_interval = 1
max_retries = 1

[[tasks]]
id = "all_done_tail"
command = "echo cleanup_after_timeout"
dependencies = ["flaky_timeout"]
trigger_rule = "all_done"

[[tasks]]
id = "all_success_tail"
command = "echo should_not_run"
dependencies = ["flaky_timeout"]
trigger_rule = "all_success"
