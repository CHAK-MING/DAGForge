id = "scene15_xcom_trigger_join"
name = "XCom Trigger Join"
description = "xcom fan-in with a one_failed audit tail"

[[tasks]]
id = "alpha"
command = "echo alpha"

[[tasks.xcom_push]]
key = "value"
source = "stdout"

[[tasks]]
id = "beta"
command = "echo beta"

[[tasks.xcom_push]]
key = "value"
source = "stdout"

[[tasks]]
id = "summary"
command = 'test "$ALPHA" = "alpha" && test "$BETA" = "beta"'
dependencies = ["alpha", "beta"]

[[tasks.xcom_pull]]
key = "value"
from = "alpha"
env = "ALPHA"
required = true

[[tasks.xcom_pull]]
key = "value"
from = "beta"
env = "BETA"
required = true

[[tasks]]
id = "failing_probe"
command = "exit 1"
dependencies = ["alpha"]
max_retries = 0

[[tasks]]
id = "audit"
command = "echo audit"
dependencies = ["summary", "failing_probe"]
trigger_rule = "one_failed"
