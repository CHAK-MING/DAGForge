id = "scene14_sensor_soft_fail"
name = "Sensor Soft Fail"
description = "soft-fail sensor skips and none_failed downstream still runs"

[[tasks]]
id = "core"
command = "echo core"

[[tasks]]
id = "wait_optional"
executor = "sensor"
sensor_type = "file"
target = "/tmp/{{dag_id}}_{{run_id}}_missing.flag"
sensor_interval = 1
timeout = 1
soft_fail = true
dependencies = ["core"]

[[tasks]]
id = "none_failed_tail"
command = "echo optional_ok"
dependencies = ["core", "wait_optional"]
trigger_rule = "none_failed"

[[tasks]]
id = "all_success_tail"
command = "echo should_not_run"
dependencies = ["core", "wait_optional"]
trigger_rule = "all_success"
